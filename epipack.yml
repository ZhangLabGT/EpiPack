name: epipack

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python
  - python=3.9
  - pip
  - ipykernel

  # Core scientific stack
  - numpy=1.26.*
  - scipy=1.11.*
  - pandas=2.1.1
  - scikit-learn=1.3.*
  - h5py
  - natsort
  - tqdm
  - typing_extensions

  # Single-cell / AnnData stack
  - anndata=0.9.2
  - scanpy=1.9.3
  - umap-learn
  - pynndescent

  # Plotting / image stack
  - matplotlib-base
  - seaborn
  - pillow
  - tifffile

  # Dataframe / Arrow support used by epipackpy
  - polars
  - pyarrow

  # Optional utilities
  - openpyxl
  - xlrd
  - pyyaml
  - psutil
